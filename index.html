        <div id="map">
        </div>

        <script>
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[20.86757355874715,-101.41200281274772],[20.89184845624715,-101.36726843443907]]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/qgis2web/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }
        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);
        var measureControl = new L.Control.Measure({
            position: 'topleft',
            primaryLengthUnit: 'meters',
            secondaryLengthUnit: 'kilometers',
            primaryAreaUnit: 'sqmeters',
            secondaryAreaUnit: 'hectares'
        });
        measureControl.addTo(map);
        document.getElementsByClassName('leaflet-control-measure-toggle')[0].innerHTML = '';
        document.getElementsByClassName('leaflet-control-measure-toggle')[0].className += ' fas fa-ruler';
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
        }
        map.createPane('pane_OpenStreetMap_0');
        map.getPane('pane_OpenStreetMap_0').style.zIndex = 400;
        var layer_OpenStreetMap_0 = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            pane: 'pane_OpenStreetMap_0',
            opacity: 1.0,
            attribution: '',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 19
        });
        layer_OpenStreetMap_0;
        map.addLayer(layer_OpenStreetMap_0);
function pop_pozos_db_1(feature, layer) {
            var popupContent = '<div style="background-color: #ffffff; padding: 0px; margin: -1px; min-width: 300px; font-family: Arial, sans-serif;">\
                    \
                    <div style="background-color: #2c3e50; color: #ffffff; padding: 12px; border-radius: 3px 3px 0 0;">\
                        <b style="font-size: 16px; text-transform: uppercase;">' + (feature.properties['nombre'] !== null ? autolinker.link(feature.properties['nombre'].toLocaleString()) : 'Sin nombre') + '</b>\
                    </div>\
                    \
                    \
                    <div style="color: #2c3e50; font-size: 13px; padding: 10px 12px; border-bottom: 1px solid #eee;">\
                        📍 <b>Ubicación:</b> ' + (feature.properties['ubicacion'] !== null ? autolinker.link(feature.properties['ubicacion'].toLocaleString()) : 'N/A') + '\
                    </div>\
                    \
                    <table style="width: 100%; font-size: 13px; color: #34495e; border-collapse: collapse;">\
                        \
                        <tr style="background-color: #f9f9f9; border-bottom: 1px solid #eee;">\
                            <td style="padding: 7px 12px;"><b>pH</b></td>\
                            <td style="text-align: right; padding: 7px 12px; font-weight: bold;">' + (feature.properties['ph'] !== null ? feature.properties['ph'] : '-') + '</td>\
                        </tr>\
                        <tr style="background-color: #A5C8C9; border-bottom: 2px solid #fff;">\
                            <td style="padding: 7px 12px;"><b>CE (µS/cm)</b></td>\
                            <td style="text-align: right; padding: 7px 12px; font-weight: bold;">' + (feature.properties['ce'] !== null ? feature.properties['ce'] : '-') + '</td>\
                        </tr>\
                        \
                        \
                        <tr>\
                            <td colspan="2" style="padding: 12px 12px 6px 12px; font-size: 11px; color: #7f8c8d; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px;">Análisis Químico [mmol/L]</td>\
                        </tr>\
                        \
                        \
                        <tr style="background-color: #A5C8C9; border-bottom: 1px solid #fff;">\
                            <td style="padding: 6px 12px;">Amonio (NH4)</td>\
                            <td style="text-align: right; padding: 6px 12px;">' + (feature.properties['amonio_nh4'] !== null ? feature.properties['amonio_nh4'] : '-') + '</td>\
                        </tr>\
                        <tr style="background-color: #A5C8C9; border-bottom: 1px solid #fff;">\
                            <td style="padding: 6px 12px;">Potasio (K)</td>\
                            <td style="text-align: right; padding: 6px 12px;">' + (feature.properties['potasio_k'] !== null ? feature.properties['potasio_k'] : '-') + '</td>\
                        </tr>\
                        <tr style="background-color: #A5C8C9; border-bottom: 1px solid #fff;">\
                            <td style="padding: 6px 12px;">Sodio (Na)</td>\
                            <td style="text-align: right; padding: 6px 12px;">' + (feature.properties['sodio_na'] !== null ? feature.properties['sodio_na'] : '-') + '</td>\
                        </tr>\
                        <tr style="background-color: #A5C8C9; border-bottom: 1px solid #fff;">\
                            <td style="padding: 6px 12px;">Calcio (Ca)</td>\
                            <td style="text-align: right; padding: 6px 12px;">' + (feature.properties['calcio_ca'] !== null ? feature.properties['calcio_ca'] : '-') + '</td>\
                        </tr>\
                        <tr style="background-color: #A5C8C9; border-bottom: 1px solid #fff;">\
                            <td style="padding: 6px 12px;">Magnesio (Mg)</td>\
                            <td style="text-align: right; padding: 6px 12px;">' + (feature.properties['magnesio_mg'] !== null ? feature.properties['magnesio_mg'] : '-') + '</td>\
                        </tr>\
                        <tr style="background-color: #A5C8C9; border-bottom: 1px solid #fff;">\
                            <td style="padding: 6px 12px;">Cloro (Cl)</td>\
                            <td style="text-align: right; padding: 6px 12px;">' + (feature.properties['cloro_cl'] !== null ? feature.properties['cloro_cl'] : '-') + '</td>\
                        </tr>\
                        <tr style="background-color: #A5C8C9; border-bottom: 1px solid #fff;">\
                            <td style="padding: 6px 12px;">Azufre (S)</td>\
                            <td style="text-align: right; padding: 6px 12px;">' + (feature.properties['azufre_s'] !== null ? feature.properties['azufre_s'] : '-') + '</td>\
                        </tr>\
                        <tr style="background-color: #A5C8C9; border-bottom: 1px solid #fff;">\
                            <td style="padding: 6px 12px;">Bicarbonatos (HCO3)</td>\
                            <td style="text-align: right; padding: 6px 12px;">' + (feature.properties['bicarbonatos_hco3'] !== null ? feature.properties['bicarbonatos_hco3'] : '-') + '</td>\
                        </tr>\
                    </table>\
                </div>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
            layer.on('popupopen', function(e) {
                addClassToPopupIfMedia(content, e.popup);
            });
            
            // CONFIGURACIÓN DEL TAMAÑO DEL CUADRO
            layer.bindPopup(content, { 
                maxHeight: 700,    // Suficiente para que no salga el scroll vertical
                minWidth: 320,     // Un poco más ancho para que los nombres no se corten
                autoPan: true      // Centra el mapa automáticamente al abrirlo
            });
        }

        function style_pozos_db_1_0() {
            return {
                pane: 'pane_pozos_db_1',
                radius: 4.0,
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(39,149,182,1.0)',
                interactive: true,
            }
        }
        map.createPane('pane_pozos_db_1');
        map.getPane('pane_pozos_db_1').style.zIndex = 401;
        map.getPane('pane_pozos_db_1').style['mix-blend-mode'] = 'normal';
        var layer_pozos_db_1 = new L.geoJson(json_pozos_db_1, {
            attribution: '',
            interactive: true,
            dataVar: 'json_pozos_db_1',
            layerName: 'layer_pozos_db_1',
            pane: 'pane_pozos_db_1',
            onEachFeature: pop_pozos_db_1,
            pointToLayer: function (feature, latlng) {
                var context = {
                    feature: feature,
                    variables: {}
                };
                return L.circleMarker(latlng, style_pozos_db_1_0(feature));
            },
        });
        bounds_group.addLayer(layer_pozos_db_1);
        map.addLayer(layer_pozos_db_1);
        const url = {"Nominatim OSM": "https://nominatim.openstreetmap.org/search?format=geojson&addressdetails=1&",
        "France BAN": "https://api-adresse.data.gouv.fr/search/?"}
        var photonControl = L.control.photon({
            url: url["Nominatim OSM"],
            feedbackLabel: '',
            position: 'topleft',
            includePosition: true,
            initial: true,
            // resultsHandler: myHandler,
        }).addTo(map);
        photonControl._container.childNodes[0].style.borderRadius="10px"
        // Create a variable to store the geoJSON data
        var x = null;
        // Create a variable to store the marker
        var marker = null;
        // Add an event listener to the Photon control to create a marker from the returned geoJSON data
        var z = null;
        photonControl.on('selected', function(e) {
            console.log(photonControl.search.resultsContainer);
            if (x != null) {
                map.removeLayer(obj3.marker);
                map.removeLayer(x);
            }
            obj2.gcd = e.choice;
            x = L.geoJSON(obj2.gcd).addTo(map);
            var label = typeof obj2.gcd.properties.label === 'undefined' ? obj2.gcd.properties.display_name : obj2.gcd.properties.label;
            obj3.marker = L.marker(x.getLayers()[0].getLatLng()).bindPopup(label).addTo(map);
            map.setView(x.getLayers()[0].getLatLng(), 17);
            z = typeof e.choice.properties.label === 'undefined'? e.choice.properties.display_name : e.choice.properties.label;
            console.log(e);
            e.target.input.value = z;
        });
        var search = document.getElementsByClassName("leaflet-photon leaflet-control")[0];
        search.classList.add("leaflet-control-search")
        search.style.display = "flex";
        search.style.backgroundColor="rgba(255,255,255,0.5)" 

        // Create the new button element
        var button = document.createElement("div");
        button.id = "gcd-button-control";
        button.className = "gcd-gl-btn fa fa-search search-button";

        // Insert the button at the beginning of the search control
        search.insertBefore(button, search.firstChild);
        last = search.lastChild;
        last.style.display = "none";
        button.addEventListener("click", function (e) {
            if (last.style.display === "none") {
                last.style.display = "block";
            } else {
                last.style.display = "none";
            }
        });
        var overlaysTree = [
            {label: '<img src="legend/pozos_db_1.png" /> pozos_db', layer: layer_pozos_db_1},
            {label: "OpenStreetMap", layer: layer_OpenStreetMap_0, radioGroup: 'bm' },]
        var lay = L.control.layers.tree(null, overlaysTree,{
            //namedToggle: true,
            //selectorBack: false,
            //closedSymbol: '&#8862; &#x1f5c0;',
            //openedSymbol: '&#8863; &#x1f5c1;',
            //collapseAll: 'Collapse all',
            //expandAll: 'Expand all',
            collapsed: true,
        });
        lay.addTo(map);
        setBounds();
        var i = 0;
        layer_pozos_db_1.eachLayer(function(layer) {
            var context = {
                feature: layer.feature,
                variables: {}
            };
            layer.bindTooltip((layer.feature.properties['nombre'] !== null?String('<div style="color: #323232; font-size: 10pt; font-family: \'Arial\', sans-serif;">' + layer.feature.properties['nombre']) + '</div>':''), {permanent: true, offset: [-0, -16], className: 'css_pozos_db_1'});
            labels.push(layer);
            totalMarkers += 1;
              layer.added = true;
              addLabel(layer, i);
              i++;
        });
        map.addControl(new L.Control.Search({
            layer: layer_pozos_db_1,
            initial: false,
            hideMarkerOnCollapse: true,
            propertyName: 'ubicacion'}));
        if (typeof url === 'undefined') {
            document.getElementsByClassName('search-button')[0].className += ' fa fa-binoculars';
        } else {
            document.getElementsByClassName('search-button')[1].className += ' fa fa-binoculars';
        }
        resetLabels([layer_pozos_db_1]);
        map.on("zoomend", function(){
            resetLabels([layer_pozos_db_1]);
        });
        map.on("layeradd", function(){
            resetLabels([layer_pozos_db_1]);
        });
        map.on("layerremove", function(){
            resetLabels([layer_pozos_db_1]);
        });
        </script>
